services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: sevana_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sevana_user
      POSTGRES_PASSWORD: sevana_pass
      POSTGRES_DB: sevana_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: