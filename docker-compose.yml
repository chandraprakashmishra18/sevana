version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: sevana-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sevana
      POSTGRES_PASSWORD: sevana123
      POSTGRES_DB: sevana
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sevana-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: